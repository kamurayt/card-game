<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>パズルRPG Phase1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0f172a;color:white;font-family:sans-serif;touch-action:none}
body{display:flex;justify-content:center}
.game{width:100%;max-width:430px;height:100svh;padding:8px;display:flex;flex-direction:column;gap:7px}
.screen{display:none;height:100%;flex-direction:column;gap:8px}
.screen.active{display:flex}
.card{background:#111827;border-radius:15px;padding:10px}
.title{text-align:center;font-size:28px;font-weight:900;color:#fff3ad;margin:10px 0}
.menu{display:flex;flex-direction:column;gap:10px}
button{border:0;border-radius:14px;padding:12px;font-size:17px;font-weight:900;background:#eef2ff;color:#111827}
.small-btn{font-size:14px;padding:8px}
.row{display:flex;gap:7px}
.row button{flex:1}
.status{font-size:12px;color:#cbd5e1;line-height:1.5;background:#020617;border-radius:10px;padding:7px}
.message{background:#020617;border-radius:12px;min-height:35px;padding:7px;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff3ad;font-size:15px;font-weight:bold}
.enemy-area{display:flex;gap:8px;align-items:center}
.enemy{width:56px;height:56px;border-radius:50%;position:relative;flex-shrink:0}
.enemy.hit{animation:hit .18s}
@keyframes hit{50%{transform:scale(.84);filter:brightness(2)}}
.enemy-info{flex:1;font-size:12px;color:#cbd5e1}
.enemy-name{font-size:18px;font-weight:bold;color:white}
.hp-wrap{height:12px;background:#020617;border-radius:999px;overflow:hidden;margin:4px 0}
.enemy-hp-bar{height:100%;width:100%;background:linear-gradient(90deg,#22c55e,#bef264);transition:.25s}
.party{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.member{background:#1e293b;border-radius:9px;padding:3px;text-align:center;position:relative}
.member .atk{font-size:10px;color:#fde68a;font-weight:bold}
.member .icon{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold}
.member .name{font-size:9px}
.player{background:#111827;border-radius:12px;padding:7px;position:relative}
.player.hit{animation:shake .25s}.player.heal{animation:heal .25s}
@keyframes shake{25%{transform:translateX(-4px)}50%{transform:translateX(4px)}}
@keyframes heal{50%{filter:brightness(1.8)}}
.hp-text{display:flex;justify-content:space-between;font-size:13px;font-weight:bold;margin-bottom:4px}
.player-hp-bar{height:12px;background:#020617;border-radius:999px;overflow:hidden}
.player-hp-inner{height:100%;width:100%;background:linear-gradient(90deg,#ef4444,#f97316,#facc15);transition:.25s}
.timer{display:flex;gap:6px;align-items:center;font-size:13px;font-weight:bold}
.timer-wrap{flex:1;height:9px;background:#020617;border-radius:999px;overflow:hidden}
.timer-bar{height:100%;width:100%;background:#38bdf8}
.board-wrap{background:#1f2937;border-radius:18px;padding:6px;flex:1;display:flex;position:relative;overflow:hidden}
.board{width:100%;height:100%;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(5,1fr);gap:4px}
.orb{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,8vw,34px);font-weight:bold;transition:transform .08s ease,opacity .08s ease}
.orb.held{opacity:.2;transform:scale(.9)}.orb.clear{opacity:0;transform:scale(.1)}
.drag-orb{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(24px,9vw,38px);font-weight:bold;pointer-events:none;z-index:100;transform:translate(-50%,-50%) scale(1.08);box-shadow:0 8px 20px rgba(0,0,0,.45);opacity:.98}
.float{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:900;pointer-events:none;animation:floatUp .9s forwards;text-shadow:0 2px 4px #000;z-index:50;white-space:nowrap}
.member .float{font-size:15px}
.damage{color:#ffe066}.healNum{color:#5dff9d}.hurt{color:#ff7b7b}
@keyframes floatUp{20%{opacity:1;transform:translate(-50%,-65%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-145%) scale(1)}}
.fire,.fire-bg{background:radial-gradient(circle at 30% 30%,#ffd4a8,#ef4444)}
.water,.water-bg{background:radial-gradient(circle at 30% 30%,#d7f1ff,#3b82f6)}
.wood,.wood-bg{background:radial-gradient(circle at 30% 30%,#e4ffd8,#22c55e)}
.light,.light-bg{background:radial-gradient(circle at 30% 30%,#fffad1,#facc15);color:#111827}
.dark,.dark-bg{background:radial-gradient(circle at 30% 30%,#f5d0fe,#9333ea)}
.none,.none-bg{background:radial-gradient(circle at 30% 30%,#eee,#64748b)}
.heart{background:radial-gradient(circle at 30% 30%,#ffe4f0,#ec4899)}
.list{overflow:auto;display:flex;flex-direction:column;gap:6px;padding-bottom:8px}
.char-row{background:#1e293b;border-radius:10px;padding:8px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="game">

<section id="home" class="screen active">
  <div class="title">パズルRPG</div>
  <div class="status" id="homeStatus"></div>
  <div class="menu">
    <button onclick="showScreen('dungeonMenu')">ダンジョン</button>
    <button onclick="showScreen('charMenu')">キャラ</button>
    <button onclick="showScreen('gacha')">ガチャ</button>
  </div>
</section>

<section id="dungeonMenu" class="screen">
  <div class="title">ダンジョン</div>
  <div class="menu">
    <button onclick="startDungeon('normal')">ノーマルダンジョン</button>
    <button onclick="startDungeon('skill')">スキル強化ダンジョン</button>
    <button onclick="startDungeon('awake')">覚醒ダンジョン</button>
    <button onclick="showScreen('home')">戻る</button>
  </div>
  <div class="status">
    ノーマル：ゴールド・ガチャ石・キャラ集め<br>
    スキル：No.7〜12素材がランダム出現<br>
    覚醒：No.13〜18素材がランダム出現
  </div>
</section>

<section id="charMenu" class="screen">
  <div class="title">キャラ一覧</div>
  <div class="row">
    <button class="small-btn" onclick="showScreen('home')">戻る</button>
  </div>
  <div class="list" id="charList"></div>
</section>

<section id="gacha" class="screen">
  <div class="title">ガチャ</div>
  <div class="card">
    ガチャ画面はPhase4で実装予定。<br>
    現在のガチャ石：<span id="gachaStoneText">0</span>
  </div>
  <button onclick="showScreen('home')">戻る</button>
</section>

<section id="battle" class="screen">
  <div class="card">
    <div class="enemy-area">
      <div class="enemy wood-bg" id="enemyIcon"></div>
      <div class="enemy-info">
        <div class="enemy-name" id="enemyName">敵</div>
        <div><span id="battleTypeText">ノーマル</span> / 階層：<span id="floorText">1</span>/5 / 属性：<span id="enemyAttrText">木</span> / 攻撃：<span id="enemyAtkText">850</span> / 攻撃まで：<span id="enemyTurnText">1</span></div>
        <div class="hp-wrap"><div class="enemy-hp-bar" id="enemyHpBar"></div></div>
        <div>敵HP：<span id="enemyHpText">5000</span>/<span id="enemyMaxHpText">5000</span></div>
      </div>
    </div>
  </div>

  <div class="message" id="message">ドロップを動かしたら5秒開始</div>
  <div class="party" id="party"></div>

  <div class="player" id="playerArea">
    <div class="hp-text">
      <span>味方HP</span>
      <span><span id="playerHpText">5550</span>/<span id="playerMaxHpText">5550</span></span>
    </div>
    <div class="player-hp-bar"><div class="player-hp-inner" id="playerHpBar"></div></div>
  </div>

  <div class="timer">
    <span>操作 <span id="timerText">5.0</span>秒</span>
    <div class="timer-wrap"><div class="timer-bar" id="timerBar"></div></div>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div class="board" id="board"></div>
  </div>

  <div class="row">
    <button class="small-btn" onclick="resetCurrentDungeon()">最初から</button>
    <button class="small-btn" onclick="retreatDungeon()">撤退</button>
  </div>

  <div class="status" id="status"></div>
</section>

</div>

<script>
const ROWS=5,COLS=6,MOVE_TIME=5;
const TYPES=["fire","water","wood","light","dark","heart"];
const ICONS={fire:"火",water:"水",wood:"木",light:"光",dark:"闇",heart:"♡"};
const JP={fire:"火",water:"水",wood:"木",light:"光",dark:"闇",heart:"回復",none:"無"};
const BG={fire:"fire-bg",water:"water-bg",wood:"wood-bg",light:"light-bg",dark:"dark-bg",none:"none-bg"};

const baseChars=[
 {no:1,rarity:1,attr:"fire",hp:500,atk:150,rcv:15,type:"battle"},
 {no:2,rarity:1,attr:"water",hp:1500,atk:50,rcv:45,type:"battle"},
 {no:3,rarity:1,attr:"wood",hp:1000,atk:100,rcv:30,type:"battle"},
 {no:4,rarity:1,attr:"dark",hp:750,atk:180,rcv:0,type:"battle"},
 {no:5,rarity:1,attr:"light",hp:1200,atk:100,rcv:50,type:"battle"},
 {no:6,rarity:1,attr:"fire",hp:600,atk:130,rcv:25,type:"battle"}
];

const materialChars=[
 {no:7,rarity:5,attr:"fire",hp:1,atk:1,rcv:1,type:"skill",target:"fire"},
 {no:8,rarity:5,attr:"water",hp:1,atk:1,rcv:1,type:"skill",target:"water"},
 {no:9,rarity:5,attr:"wood",hp:1,atk:1,rcv:1,type:"skill",target:"wood"},
 {no:10,rarity:5,attr:"dark",hp:1,atk:1,rcv:1,type:"skill",target:"dark"},
 {no:11,rarity:5,attr:"light",hp:1,atk:1,rcv:1,type:"skill",target:"light"},
 {no:12,rarity:10,attr:"none",hp:1,atk:1,rcv:1,type:"skill",target:"any"},
 {no:13,rarity:5,attr:"fire",hp:1,atk:1,rcv:1,type:"awake",target:"fire"},
 {no:14,rarity:5,attr:"water",hp:1,atk:1,rcv:1,type:"awake",target:"water"},
 {no:15,rarity:5,attr:"wood",hp:1,atk:1,rcv:1,type:"awake",target:"wood"},
 {no:16,rarity:5,attr:"dark",hp:1,atk:1,rcv:1,type:"awake",target:"dark"},
 {no:17,rarity:5,attr:"light",hp:1,atk:1,rcv:1,type:"awake",target:"light"},
 {no:18,rarity:10,attr:"none",hp:1,atk:1,rcv:1,type:"awake",target:"any"}
];

const normalEnemies=[
 {name:"モリスライム",attr:"wood",hp:5000,atk:850,turn:1,drop:{no:101,name:"モリスライム",attr:"wood"}},
 {name:"アクアゴブリン",attr:"water",hp:6200,atk:900,turn:2,drop:{no:102,name:"アクアゴブリン",attr:"water"}},
 {name:"ファイアドラゴン",attr:"fire",hp:7600,atk:1100,turn:2,drop:{no:103,name:"ファイアドラゴン",attr:"fire"}},
 {name:"ダークナイト",attr:"dark",hp:9000,atk:1300,turn:2,drop:{no:104,name:"ダークナイト",attr:"dark"}},
 {name:"ライトゴーレム",attr:"light",hp:11000,atk:1500,turn:3,drop:{no:105,name:"ライトゴーレム",attr:"light"}}
];

let save=JSON.parse(localStorage.getItem("puzzleRpgSave")||"null")||{
 money:0,stone:0,enhance:0,owned:[...baseChars.map(c=>({...c,count:1}))],clearedNormal:0,cleared:{}
};

let party=baseChars;
let currentType="normal",normalNo=1,floorIndex=0,floors=[];
let tempDrops=[],tempStone=0;
let board=[],dragging=false,movedOnce=false,resolving=false,selected=null,timerId=null,dragGhost=null,heldType=null;
let playerMaxHp=0,playerHp=0,totalRcv=0;
let enemyHp=0,enemyMaxHp=0,enemyAttr="",enemyAtk=0,enemyTurn=1,enemyTurnMax=1;

const $=id=>document.getElementById(id);
const boardEl=$("board"),boardWrap=$("boardWrap"),partyEl=$("party"),message=$("message");
const enemyIcon=$("enemyIcon"),enemyName=$("enemyName"),enemyHpBar=$("enemyHpBar");
const enemyHpText=$("enemyHpText"),enemyMaxHpText=$("enemyMaxHpText"),enemyAttrText=$("enemyAttrText");
const enemyAtkText=$("enemyAtkText"),enemyTurnText=$("enemyTurnText"),floorText=$("floorText");
const playerArea=$("playerArea"),playerHpText=$("playerHpText"),playerMaxHpText=$("playerMaxHpText"),playerHpBar=$("playerHpBar");
const timerText=$("timerText"),timerBar=$("timerBar"),statusEl=$("status");

function saveData(){localStorage.setItem("puzzleRpgSave",JSON.stringify(save))}
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active");updateHome();if(id==="charMenu")renderCharList();if(id==="gacha")$("gachaStoneText").textContent=save.stone}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function randomType(){return TYPES[Math.floor(Math.random()*TYPES.length)]}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function pop(target,text,cls){const d=document.createElement("div");d.className="float "+cls;d.textContent=text;target.appendChild(d);setTimeout(()=>d.remove(),900)}
function flash(el,cls){el.classList.remove(cls);void el.offsetWidth;el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),260)}

function updateHome(){
 $("homeStatus").innerHTML=`ゴールド：${save.money}<br>ガチャ石：${save.stone}<br>ノーマル到達：ダンジョン${save.clearedNormal+1}`;
}

function renderCharList(){
 const list=$("charList");list.innerHTML="";
 save.owned.forEach(c=>{
  const row=document.createElement("div");
  row.className="char-row";
  const kind=c.type==="battle"?"戦闘":c.type==="skill"?"スキル素材":c.type==="awake"?"覚醒素材":"ドロップ";
  row.innerHTML=`<span>★${c.rarity||1} No.${c.no} ${JP[c.attr]||c.attr} ${kind}</span><span>×${c.count||1}</span>`;
  list.appendChild(row);
 });
}

function addOwned(char){
 const found=save.owned.find(c=>c.no===char.no);
 if(found)found.count=(found.count||1)+1;
 else save.owned.push({...char,count:1});
}

function renderParty(){
 partyEl.innerHTML="";
 party=baseChars;
 playerMaxHp=party.reduce((s,m)=>s+m.hp,0);
 totalRcv=party.reduce((s,m)=>s+m.rcv,0);
 party.forEach(m=>{
  const d=document.createElement("div");
  d.className="member";
  d.innerHTML=`<div class="atk">攻 ${m.atk}</div><div class="icon ${BG[m.attr]}">${JP[m.attr]}</div><div class="name">★${m.rarity} No.${m.no}</div>`;
  partyEl.appendChild(d);
 });
}

function updateStatus(){
 statusEl.innerHTML=`仮獲得：キャラ${tempDrops.length}体 / ガチャ石${tempStone}個<br>※クリア以外は没収`;
}

function pickMaterial(type){
 const pool=materialChars.filter(c=>c.type===type);
 const n=rand(1,100);
 if(n<=5)return pool.find(c=>c.rarity===10);
 const normals=pool.filter(c=>c.rarity===5);
 return normals[rand(0,normals.length-1)];
}

function makeMaterialEnemy(type){
 const m=pickMaterial(type);
 const universal=m.rarity===10;
 return{
  name:`No.${m.no} ${universal?"万能":JP[m.attr]}${type==="skill"?"スキル":"覚醒"}素材`,
  attr:m.attr==="none"?"light":m.attr,
  hp:universal?22000:9500,
  atk:universal?2600:1400,
  turn:universal?2:2,
  drop:{...m,name:`No.${m.no}素材`,count:1},
  dropRate:1,
  gachaRate:0.35
 };
}

function makeNormalFloors(){
 const arr=[];
 for(let i=0;i<5;i++){
  const base=normalEnemies[i%normalEnemies.length];
  let hpMul=1+(normalNo-1)*0.08+i*0.05;
  let atkMul=1+(normalNo-1)*0.05+i*0.04;
  if(i===4){hpMul*=1.5;atkMul*=1.2}
  arr.push({...base,hp:Math.floor(base.hp*hpMul),atk:Math.floor(base.atk*atkMul),dropRate:0.45,gachaRate:0.35});
 }
 return arr;
}

function startDungeon(type){
 currentType=type;
 normalNo=save.clearedNormal+1;
 floorIndex=0;tempDrops=[];tempStone=0;
 if(type==="normal"){floors=makeNormalFloors();$("battleTypeText").textContent=`ノーマル${normalNo}`}
 if(type==="skill"){floors=Array.from({length:5},()=>makeMaterialEnemy("skill"));$("battleTypeText").textContent="スキル強化"}
 if(type==="awake"){floors=Array.from({length:5},()=>makeMaterialEnemy("awake"));$("battleTypeText").textContent="覚醒"}
 showScreen("battle");
 resetBattleState();
}

function resetBattleState(){
 stopTimer();removeDragGhost();
 dragging=false;movedOnce=false;resolving=false;selected=null;heldType=null;
 playerHp=playerMaxHp;
 timerText.textContent="5.0";timerBar.style.width="100%";
 setEnemy();createBoard();updateStatus();
 message.textContent="ドロップを動かしたら5秒開始";
}

function resetCurrentDungeon(){floorIndex=0;tempDrops=[];tempStone=0;if(currentType==="normal")floors=makeNormalFloors();if(currentType==="skill")floors=Array.from({length:5},()=>makeMaterialEnemy("skill"));if(currentType==="awake")floors=Array.from({length:5},()=>makeMaterialEnemy("awake"));resetBattleState()}

function createBoard(){board=[];for(let r=0;r<ROWS;r++){const row=[];for(let c=0;c<COLS;c++)row.push(randomType());board.push(row)}renderBoard()}
function renderBoard(){boardEl.innerHTML="";for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const o=document.createElement("div");o.className="orb "+board[r][c];o.textContent=ICONS[board[r][c]];if(selected&&selected.r===r&&selected.c===c&&dragging)o.classList.add("held");boardEl.appendChild(o)}}
function getCell(x,y){const rect=boardEl.getBoundingClientRect(),cw=rect.width/COLS,ch=rect.height/ROWS;const c=Math.floor((x-rect.left)/cw),r=Math.floor((y-rect.top)/ch);if(r<0||c<0||r>=ROWS||c>=COLS)return null;return{r,c}}
function getCellSize(){const rect=boardEl.getBoundingClientRect();return{w:rect.width/COLS-4,h:rect.height/ROWS-4}}
function createDragGhost(type,x,y){removeDragGhost();const size=getCellSize();dragGhost=document.createElement("div");dragGhost.className="drag-orb "+type;dragGhost.textContent=ICONS[type];dragGhost.style.width=size.w+"px";dragGhost.style.height=size.h+"px";boardWrap.appendChild(dragGhost);moveDragGhost(x,y)}
function moveDragGhost(x,y){if(!dragGhost)return;const rect=boardWrap.getBoundingClientRect();dragGhost.style.left=(x-rect.left)+"px";dragGhost.style.top=(y-rect.top)+"px"}
function removeDragGhost(){if(dragGhost){dragGhost.remove();dragGhost=null}}
function swap(a,b){const t=board[a.r][a.c];board[a.r][a.c]=board[b.r][b.c];board[b.r][b.c]=t}
function isNear(a,b){return Math.abs(a.r-b.r)+Math.abs(a.c-b.c)===1}

function startTimer(){stopTimer();const start=performance.now();timerId=setInterval(()=>{const left=Math.max(0,MOVE_TIME-(performance.now()-start)/1000);timerText.textContent=left.toFixed(1);timerBar.style.width=(left/MOVE_TIME*100)+"%";if(left<=0)endDrag()},50)}
function stopTimer(){if(timerId){clearInterval(timerId);timerId=null}}

function startDrag(e){e.preventDefault();if(resolving||playerHp<=0||enemyHp<=0)return;const cell=getCell(e.clientX,e.clientY);if(!cell)return;dragging=true;movedOnce=false;selected=cell;heldType=board[cell.r][cell.c];createDragGhost(heldType,e.clientX,e.clientY);renderBoard()}
function moveOneStep(next){if(!selected||!next)return false;if(next.r<0||next.c<0||next.r>=ROWS||next.c>=COLS)return false;if(!isNear(selected,next))return false;if(!movedOnce){movedOnce=true;startTimer();message.textContent="操作中…"}swap(selected,next);selected=next;return true}
function moveDrag(e){e.preventDefault();if(!dragging||!selected||resolving)return;moveDragGhost(e.clientX,e.clientY);const cell=getCell(e.clientX,e.clientY);if(!cell||(cell.r===selected.r&&cell.c===selected.c))return;const dr=cell.r-selected.r,dc=cell.c-selected.c,sr=Math.sign(dr),sc=Math.sign(dc);let changed=false;if(Math.abs(dc)>=Math.abs(dr)){if(sc)changed=moveOneStep({r:selected.r,c:selected.c+sc})||changed;if(sr)changed=moveOneStep({r:selected.r+sr,c:selected.c})||changed}else{if(sr)changed=moveOneStep({r:selected.r+sr,c:selected.c})||changed;if(sc)changed=moveOneStep({r:selected.r,c:selected.c+sc})||changed}if(changed)renderBoard()}
function endDrag(e){if(e)e.preventDefault();if(!dragging)return;dragging=false;selected=null;heldType=null;stopTimer();removeDragGhost();renderBoard();if(!movedOnce)return;resolveBoard()}

function getMatchedMap(){const map={};for(let r=0;r<ROWS;r++){let count=1;for(let c=1;c<=COLS;c++){if(c<COLS&&board[r][c]&&board[r][c]===board[r][c-1])count++;else{if(count>=3)for(let k=0;k<count;k++)map[r+","+(c-1-k)]=true;count=1}}}for(let c=0;c<COLS;c++){let count=1;for(let r=1;r<=ROWS;r++){if(r<ROWS&&board[r][c]&&board[r][c]===board[r-1][c])count++;else{if(count>=3)for(let k=0;k<count;k++)map[(r-1-k)+","+c]=true;count=1}}}return map}
function getGroups(){const matched=getMatchedMap(),visited={},groups=[],dirs=[[1,0],[-1,0],[0,1],[0,-1]];Object.keys(matched).forEach(key=>{if(visited[key])return;const [sr,sc]=key.split(",").map(Number),type=board[sr][sc],stack=[{r:sr,c:sc}],cells=[];visited[key]=true;while(stack.length){const cur=stack.pop();cells.push(cur);dirs.forEach(([dr,dc])=>{const nr=cur.r+dr,nc=cur.c+dc,nk=nr+","+nc;if(nr<0||nc<0||nr>=ROWS||nc>=COLS||!matched[nk]||visited[nk]||board[nr][nc]!==type)return;visited[nk]=true;stack.push({r:nr,c:nc})})}groups.push({type,cells,count:cells.length})});return groups}

async function resolveBoard(){resolving=true;let combo=0,cleared=[];while(true){const groups=getGroups();if(!groups.length)break;for(const g of groups){combo++;cleared.push({...g,combo});message.textContent=combo+"コンボ！ "+JP[g.type]+"を"+g.count+"個消した";markClear(g.cells);await sleep(220);g.cells.forEach(cell=>board[cell.r][cell.c]=null);renderBoard();await sleep(80)}dropOrbs();renderBoard();await sleep(250)}if(combo===0){message.textContent="コンボなし";enemyAttack();resolving=false;return}const result=calcDamage(cleared,combo);applyResult(result,combo);await sleep(650);if(enemyHp<=0)floorClear();else enemyAttack();resolving=false}
function markClear(cells){const orbs=[...boardEl.children];cells.forEach(cell=>{const i=cell.r*COLS+cell.c;if(orbs[i])orbs[i].classList.add("clear")})}
function dropOrbs(){for(let c=0;c<COLS;c++){const remain=[];for(let r=ROWS-1;r>=0;r--)if(board[r][c])remain.push(board[r][c]);while(remain.length<ROWS)remain.push(randomType());for(let r=ROWS-1;r>=0;r--)board[r][c]=remain[ROWS-1-r]}}

function comboMul(combo){return 1+(combo-1)*.25}
function orbMul(count){return 1+(count-3)*.25}
function leaderMul(combo){let m=1;if(combo>=5)m*=3;else if(combo>=4)m*=2;if(combo>=7)m*=5;return m}
function attrRate(a,d){if(a==="fire"&&d==="wood")return 2;if(a==="fire"&&d==="water")return .5;if(a==="water"&&d==="fire")return 2;if(a==="water"&&d==="wood")return .5;if(a==="wood"&&d==="water")return 2;if(a==="wood"&&d==="fire")return .5;if(a==="light"&&d==="dark")return 2;if(a==="dark"&&d==="light")return 2;return 1}
function calcDamage(groups,combo){let heal=0,memberDamage={};const cm=comboMul(combo),lm=leaderMul(combo);groups.forEach(g=>{const om=orbMul(g.count);if(g.type==="heart"){heal+=Math.floor(totalRcv*om*cm);return}party.forEach((m,index)=>{if(m.attr!==g.type)return;const damage=Math.floor(m.atk*om*cm*lm*attrRate(m.attr,enemyAttr));memberDamage[index]=(memberDamage[index]||0)+damage})});return{memberDamage,heal,lm}}
function applyResult(res,combo){if(res.heal>0){playerHp=Math.min(playerMaxHp,playerHp+res.heal);pop(playerArea,"+"+res.heal,"healNum");flash(playerArea,"heal")}let totalDamage=0;party.forEach((m,index)=>{const damage=res.memberDamage[index]||0;totalDamage+=damage;const card=partyEl.children[index];if(damage>0&&card)pop(card,damage,"damage")});if(totalDamage>0){enemyHp=Math.max(0,enemyHp-totalDamage);pop(enemyIcon,totalDamage,"damage");flash(enemyIcon,"hit")}updateHp();let text=combo+"コンボ！ "+totalDamage+"ダメージ！";if(res.heal>0)text+=" HP"+res.heal+"回復！";if(res.lm>1)text+=" LS"+res.lm+"倍！";if(enemyHp<=0)text+=" 撃破！";message.textContent=text}

function enemyAttack(){if(enemyHp<=0||playerHp<=0)return;enemyTurn--;if(enemyTurn<=0){playerHp=Math.max(0,playerHp-enemyAtk);enemyTurn=enemyTurnMax;pop(playerArea,"-"+enemyAtk,"hurt");flash(playerArea,"hit");updateHp();if(playerHp<=0){tempDrops=[];tempStone=0;updateStatus();message.textContent="ゲームオーバー… 仮獲得は全て没収"}else message.textContent+=" / 敵の攻撃！"+enemyAtk+"ダメージ"}enemyTurnText.textContent=enemyTurn}

function floorClear(){
 const floor=floors[floorIndex];
 if(Math.random()<(floor.dropRate??1)){tempDrops.push(floor.drop);message.textContent+=" / "+(floor.drop.name||"キャラ")+"がドロップ！"}
 const key=currentType==="normal"?"normal_"+normalNo:currentType;
 const first=!save.cleared[key];
 if(!first&&Math.random()<(floor.gachaRate??0.35)){tempStone++;message.textContent+=" / ガチャ石+1"}
 updateStatus();
 setTimeout(()=>{if(floorIndex>=floors.length-1)clearDungeon(key,first);else{floorIndex++;setEnemy();createBoard();message.textContent="次の階層へ！"}},900);
}

function clearDungeon(key,first){
 const money=currentType==="normal"?rand(500+normalNo*80,1000+normalNo*120):rand(300,700);
 const stone=first?20:tempStone;
 save.money+=money;save.stone+=stone;tempDrops.forEach(addOwned);save.cleared[key]=true;
 if(currentType==="normal"&&normalNo>save.clearedNormal)save.clearedNormal=normalNo;
 saveData();
 message.innerHTML=`ダンジョンクリア！<br>ゴールド+${money} / ガチャ石+${stone} / キャラ+${tempDrops.length}`;
 tempDrops=[];tempStone=0;updateStatus();updateHome();
}

function retreatDungeon(){tempDrops=[];tempStone=0;updateStatus();message.textContent="撤退したため、仮獲得は全て没収";showScreen("dungeonMenu")}

function setEnemy(){const e=floors[floorIndex];enemyMaxHp=e.hp;enemyHp=e.hp;enemyAttr=e.attr;enemyAtk=e.atk;enemyTurnMax=e.turn;enemyTurn=e.turn;enemyName.textContent=e.name;enemyAttrText.textContent=JP[e.attr];enemyAtkText.textContent=e.atk;enemyIcon.className="enemy "+BG[e.attr];floorText.textContent=floorIndex+1;updateHp()}
function updateHp(){enemyHpText.textContent=enemyHp;enemyMaxHpText.textContent=enemyMaxHp;enemyHpBar.style.width=(enemyHp/enemyMaxHp*100)+"%";playerHpText.textContent=playerHp;playerMaxHpText.textContent=playerMaxHp;playerHpBar.style.width=(playerHp/playerMaxHp*100)+"%";enemyTurnText.textContent=enemyTurn}

boardEl.addEventListener("pointerdown",startDrag);
window.addEventListener("pointermove",moveDrag);
window.addEventListener("pointerup",endDrag);
window.addEventListener("pointercancel",endDrag);

renderParty();
updateHome();
</script>
