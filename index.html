<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Prototype</title>

<style>
*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#070b18;
color:white;
font-family:sans-serif;
padding-bottom:110px;
}

.hidden{
display:none!important;
}

.topbar{
position:sticky;
top:0;
z-index:50;
background:#10183a;
padding:12px;
border-bottom:2px solid #1d2a68;
}

button{
border:none;
border-radius:12px;
padding:10px;
font-weight:bold;
background:#536dff;
color:white;
}

.home-screen{
padding:14px;
}

.menu-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:16px;
}

.menu-btn{
height:90px;
font-size:20px;
border-radius:18px;
background:#17214b;
border:2px solid #394a96;
}

.cpu-select{
margin-top:18px;
background:#111936;
padding:12px;
border-radius:14px;
border:2px solid #28366d;
}

.cpu-list{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

.cpu-btn{
background:#1c2858;
}

.game{
padding:10px;
}

.player-area{
background:#0d1431;
border:2px solid #2d3f89;
border-radius:18px;
padding:10px;
margin-bottom:14px;
}

.active-turn{
border-color:gold;
box-shadow:0 0 15px rgba(255,215,0,.4);
}

.zone-title{
font-weight:bold;
margin:8px 0 4px;
}

.zone{
display:grid;
grid-template-columns:repeat(5,minmax(0,1fr));
gap:4px;
width:100%;
}

.slot{
height:76px;
border:1px dashed #4f587e;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
color:#6f789e;
font-size:11px;
background:#101427;
}

.card{
width:100%;
height:116px;
overflow:hidden;
background:#1f2854;
border:1px solid #4d5ba5;
border-radius:12px;
padding:4px;
font-size:10px;
}

.monster{
background:#2a315f;
}

.spell{
background:#16535c;
}

.selected{
outline:3px solid #ffd35a;
box-shadow:0 0 10px #ffd35a;
}

.tribute-selected{
outline:3px solid #ff5a5a;
box-shadow:0 0 10px #ff5a5a;
}

.card-name{
font-size:11px;
font-weight:bold;
line-height:1.1;
margin-bottom:2px;
}

.hand{
display:grid;
grid-template-columns:repeat(5,minmax(0,1fr));
gap:4px;
width:100%;
}

.bottom-actions{
position:fixed;
bottom:0;
left:0;
right:0;
background:#10183a;
padding:8px;
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
z-index:100;
}

.bottom-actions button{
padding:10px 4px;
font-size:11px;
}

.log{
background:black;
padding:10px;
border-radius:12px;
margin:10px 0;
font-size:13px;
max-height:180px;
overflow:auto;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
background:#1b2147;
padding:20px;
border-radius:20px;
width:85%;
max-width:360px;
border:3px solid #e2b84e;
text-align:center;
}

.phase-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1b2147;
padding:18px 30px;
border-radius:18px;
border:3px solid gold;
font-size:24px;
font-weight:bold;
z-index:998;
animation:fade 1.2s forwards;
pointer-events:none;
}

@keyframes fade{
0%{opacity:0;transform:translate(-50%,-50%) scale(.8)}
20%{opacity:1}
80%{opacity:1}
100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}
}

.small{
font-size:12px;
opacity:.8;
}
</style>
</head>

<body>

<div id="homeScreen" class="home-screen">

<h1>TCG Prototype</h1>

<div class="menu-grid">
<button class="menu-btn">対戦</button>
<button class="menu-btn">カード</button>
<button class="menu-btn">デッキ</button>
<button class="menu-btn">パック</button>
</div>

<div class="cpu-select">

<h3>CPUレベル選択</h3>

<div class="cpu-list">

<button class="cpu-btn" onclick="startGame(1)">CPU Lv.1</button>
<button class="cpu-btn" onclick="startGame(2)">CPU Lv.2</button>
<button class="cpu-btn" onclick="startGame(3)">CPU Lv.3</button>
<button class="cpu-btn" onclick="startGame(4)">CPU Lv.4</button>
<button class="cpu-btn" onclick="startGame(5)">CPU Lv.5</button>
<button class="cpu-btn" onclick="startGame(6)">CPU Lv.6</button>
<button class="cpu-btn" onclick="startGame(7)">CPU Lv.7</button>
<button class="cpu-btn" onclick="startGame(8)">CPU Lv.8</button>
<button class="cpu-btn" onclick="startGame(9)">CPU Lv.9</button>
<button class="cpu-btn" onclick="startGame(10)">CPU Lv.10</button>

</div>

</div>

</div>

<div id="gameScreen" class="hidden">

<div class="topbar">
<div id="turnText"></div>
<div class="small" id="summonText"></div>
</div>

<div class="game">

<div id="enemyArea" class="player-area">

<h2 id="enemyName"></h2>
<div class="small" id="enemyInfo"></div>

<div class="zone-title">スペルゾーン</div>
<div class="zone" id="enemySpell"></div>

<div class="zone-title">バトルゾーン</div>
<div class="zone" id="enemyBattle"></div>

</div>

<div class="log" id="log"></div>

<div id="playerArea" class="player-area">

<h2>プレイヤー LP:<span id="playerLP"></span></h2>
<div class="small" id="playerInfo"></div>

<div class="zone-title">バトルゾーン</div>
<div class="zone" id="playerBattle"></div>

<div class="zone-title">スペルゾーン</div>
<div class="zone" id="playerSpell"></div>

<div class="zone-title">手札</div>
<div class="hand" id="playerHand"></div>

</div>

</div>

<div class="bottom-actions">

<button onclick="normalSummon()">通常</button>
<button onclick="tributeMode()">生贄</button>
<button onclick="attack()">攻撃</button>
<button onclick="setSpell()">設置</button>
<button onclick="spell()">発動</button>
<button onclick="endTurn()">終了</button>

</div>

</div>

<div id="modal" class="modal hidden">

<div class="modal-box">

<h2 id="modalTitle"></h2>

<p id="modalText"></p>

<button onclick="closeModal()">OK</button>

</div>

</div>

<script>

const CARD_MASTER=[

{id:"No.1",name:"火の小兵",type:"monster",core:1,atk:500,def:500,dmg:1,copies:3},
{id:"No.2",name:"火炎兵",type:"monster",core:2,atk:1000,def:500,dmg:1,copies:3},
{id:"No.3",name:"紅蓮守士",type:"monster",core:2,atk:500,def:1000,dmg:1,copies:2},
{id:"No.4",name:"紅蓮闘士",type:"monster",core:3,atk:1000,def:1000,dmg:2,copies:2},
{id:"No.5",name:"爆炎騎士",type:"monster",core:4,atk:1500,def:1000,dmg:3,copies:2},
{id:"No.6",name:"炎帝竜",type:"monster",core:5,atk:2000,def:1500,dmg:4,copies:2,effect:"召喚時ATK-500"},
{id:"No.7",name:"炎刃強化",type:"spell",copies:2,effect:"ATK+500",spell:"atkUp"},
{id:"No.8",name:"火力封じ",type:"spell",copies:2,effect:"ATK-500",spell:"atkDown"},
{id:"No.9",name:"爆砕魔法",type:"spell",copies:2,effect:"相手破壊",spell:"destroy"}

];

let player;
let enemy;
let turnPlayer="player";
let cpuLevel=1;

let normalUsed=false;
let tributeUsed=false;
let selected=null;
let tributeModeActive=false;
let tributeTargets=[];

let firstTurn=true;
let turnCount=1;

function clone(card){

return JSON.parse(JSON.stringify({
...card,
uid:Math.random().toString(36).slice(2),
tempAtk:0,
permanentAtk:0,
attacksUsed:0,
blocksUsed:0
}));

}

function buildDeck(){

let deck=[];

CARD_MASTER.forEach(card=>{

for(let i=0;i<card.copies;i++){

deck.push(clone(card));

}

});

return shuffle(deck);

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];

}

return arr;

}

function startGame(level){

cpuLevel=level;

player={
lp:20,
deck:buildDeck(),
hand:[],
battle:[],
spell:[],
grave:[]
};

enemy={
lp:20,
deck:buildDeck(),
hand:[],
battle:[],
spell:[],
grave:[]
};

for(let i=0;i<5;i++){

draw(player);
draw(enemy);

}

turnPlayer=Math.random()<0.5?"player":"enemy";

normalUsed=false;
tributeUsed=false;
selected=null;
tributeTargets=[];

document.getElementById("homeScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

openModal(
"先攻後攻決定",
(turnPlayer==="player"?"プレイヤー":"CPU Lv."+cpuLevel)
+" が先攻です。<br>先攻1ターン目はドローなし・攻撃なし。"
);

addLog((turnPlayer==="player"?"プレイヤー":"CPU")+"が先攻。");

render();

}

function draw(target){

if(target.deck.length>0){

target.hand.push(target.deck.shift());

}

}

function current(){

return turnPlayer==="player"?player:enemy;

}

function opponent(){

return turnPlayer==="player"?enemy:player;

}

function getAtk(card){

return Math.max(0,(card.atk||0)+(card.tempAtk||0)+(card.permanentAtk||0));

}

function render(){

document.getElementById("turnText").innerHTML=
(turnPlayer==="player"?"プレイヤー":"CPU Lv."+cpuLevel)+"のターン";

document.getElementById("summonText").innerHTML=
"通常："+(normalUsed?"済":"未")
+" / 生贄："+(tributeUsed?"済":"未");

document.getElementById("playerLP").innerText=player.lp;

document.getElementById("enemyName").innerHTML=
"CPU Lv."+cpuLevel+" LP:"+enemy.lp;

document.getElementById("playerInfo").innerHTML=
"山札:"+player.deck.length+" 手札:"+player.hand.length+" 墓地:"+player.grave.length;

document.getElementById("enemyInfo").innerHTML=
"山札:"+enemy.deck.length+" 手札:"+enemy.hand.length+" 墓地:"+enemy.grave.length;

renderZone("playerBattle",player.battle,"player","battle");
renderZone("playerSpell",player.spell,"player","spell");
renderZone("enemyBattle",enemy.battle,"enemy","battle");
renderZone("enemySpell",enemy.spell,"enemy","spell");

renderHand();

document.getElementById("playerArea").className=
"player-area"+(turnPlayer==="player"?" active-turn":"");

document.getElementById("enemyArea").className=
"player-area"+(turnPlayer==="enemy"?" active-turn":"");

}

function renderZone(id,data,owner,zone){

const el=document.getElementById(id);

el.innerHTML="";

for(let i=0;i<5;i++){

if(data[i]){

el.innerHTML+=cardHTML(data[i],owner,zone,i);

}else{

el.innerHTML+=`<div class="slot">空</div>`;

}

}

}

function renderHand(){

const hand=document.getElementById("playerHand");

hand.innerHTML="";

player.hand.forEach((card,i)=>{

hand.innerHTML+=cardHTML(card,"player","hand",i);

});

}

function cardHTML(card,owner,zone,index){

const isSelected=
selected &&
selected.owner===owner &&
selected.zone===zone &&
selected.index===index;

const tributeSelected=
tributeTargets.includes(index)&&zone==="battle";

const click=owner==="player"
?`onclick="selectCard('${owner}','${zone}',${index})"`
:"";

if(card.type==="monster"){

return `
<div class="card monster ${isSelected?"selected":""} ${tributeSelected?"tribute-selected":""}" ${click}>
<div class="card-name">${card.name}</div>
<div>コア${card.core}</div>
<div>ATK:${getAtk(card)}</div>
<div>DEF:${card.def}</div>
<div>DMG:${card.dmg}</div>
</div>
`;

}

return `
<div class="card spell ${isSelected?"selected":""}" ${click}>
<div class="card-name">${card.name}</div>
<div>スペル</div>
<div>${card.effect||""}</div>
</div>
`;

}

function selectCard(owner,zone,index){

if(turnPlayer!=="player") return;

if(tributeModeActive && zone==="battle"){

if(tributeTargets.includes(index)){

tributeTargets=tributeTargets.filter(i=>i!==index);

}else{

tributeTargets.push(index);

}

render();
return;

}

selected={owner,zone,index};

render();

}

function normalSummon(){

if(turnPlayer!=="player") return;

if(normalUsed){

openModal("通常召喚","既に通常召喚済みです。");
return;

}

if(!selected || selected.zone!=="hand"){

openModal("通常召喚","手札のモンスターを選択してください。");
return;

}

const card=player.hand[selected.index];

if(card.type!=="monster"){

openModal("通常召喚","モンスターを選択してください。");
return;

}

if(card.core>=5){

openModal("通常召喚","コア5以上は生贄召喚です。");
return;

}

player.hand.splice(selected.index,1);

player.battle.push(card);

normalUsed=true;

phasePopup("通常召喚");

openModal(
"召喚成功",
card.name+"を通常召喚しました。"
);

addLog(card.name+"を通常召喚。");

selected=null;

render();

}

function tributeMode(){

if(turnPlayer!=="player") return;

if(tributeUsed){

openModal("生贄召喚","既に生贄召喚済みです。");
return;

}

if(!selected || selected.zone!=="hand"){

openModal("生贄召喚","手札のコア5以上モンスターを選択してください。");
return;

}

const card=player.hand[selected.index];

if(card.type!=="monster" || card.core<5){

openModal("生贄召喚","コア5以上モンスターを選択してください。");
return;

}

tributeModeActive=true;

openModal(
"生贄選択",
"場のモンスターを選択してください。<br>もう一度生贄ボタンで確定。"
);

}

function tributeSummonConfirm(){

const card=player.hand[selected.index];

let total=0;

tributeTargets.forEach(i=>{

if(player.battle[i]) total+=player.battle[i].core;

});

if(total<card.core){

openModal(
"生贄召喚",
"コア合計が足りません。"
);

return;

}

tributeTargets.sort((a,b)=>b-a);

let names=[];

tributeTargets.forEach(i=>{

const sent=player.battle.splice(i,1)[0];

if(sent){

names.push(sent.name);
player.grave.push(sent);

}

});

player.hand.splice(selected.index,1);

player.battle.push(card);

tributeUsed=true;

tributeModeActive=false;

phasePopup("生贄召喚");

openModal(
"生贄召喚成功",
names.join("、")+"を墓地へ送り、<br>"+card.name+"を召喚。"
);

addLog(card.name+"を生贄召喚。");

if(card.id==="No.6" && enemy.battle.length>0){

enemy.battle[0].permanentAtk-=500;

openModal(
"召喚時効果",
enemy.battle[0].name+"のATKを500下げた。"
);

}

tributeTargets=[];
selected=null;

render();

}

function attack(){

if(turnPlayer!=="player") return;

if(firstTurn){

openModal(
"攻撃不可",
"先攻1ターン目は攻撃できません。"
);

return;

}

if(!selected || selected.zone!=="battle"){

openModal(
"攻撃",
"攻撃するモンスターを選択してください。"
);

return;

}

const attacker=player.battle[selected.index];

if(attacker.attacksUsed>=1){

openModal(
"攻撃",
"このモンスターは攻撃済みです。"
);

return;

}

phasePopup("バトルフェイズ");

openModal(
"攻撃宣言",
attacker.name+"が攻撃。"
);

attacker.attacksUsed++;

if(enemy.battle.length>0){

const blocker=enemy.battle[0];

openModal(
"ブロック",
blocker.name+"がブロック。"
);

if(getAtk(attacker)>blocker.def){

enemy.grave.push(enemy.battle.shift());

openModal(
"戦闘結果",
blocker.name+"を破壊して墓地へ送った。"
);

}else if(getAtk(attacker)<blocker.def){

player.grave.push(player.battle.splice(selected.index,1)[0]);

openModal(
"戦闘結果",
attacker.name+"が破壊された。"
);

}else{

enemy.grave.push(enemy.battle.shift());
player.grave.push(player.battle.splice(selected.index,1)[0]);

openModal(
"戦闘結果",
"相打ち。"
);

}

}else{

enemy.lp-=attacker.dmg;

openModal(
"直接攻撃",
enemy.name+"に"+attacker.dmg+"ダメージ。"
);

}

selected=null;

render();

checkWin();

}

function setSpell(){

if(turnPlayer!=="player") return;

if(!selected || selected.zone!=="hand"){

openModal(
"スペル設置",
"手札のスペルを選択してください。"
);

return;

}

const card=player.hand[selected.index];

if(card.type!=="spell"){

openModal(
"スペル設置",
"スペルを選択してください。"
);

return;

}

player.hand.splice(selected.index,1);

player.spell.push(card);

openModal(
"スペル設置",
card.name+"をスペルゾーンへ設置。"
);

addLog(card.name+"を設置。");

selected=null;

render();

}

function spell(){

if(turnPlayer!=="player") return;

let card=null;
let fromSpell=false;

if(selected){

if(selected.zone==="hand"){

card=player.hand[selected.index];

}else if(selected.zone==="spell"){

card=player.spell[selected.index];
fromSpell=true;

}

}

if(!card || card.type!=="spell"){

openModal(
"スペル発動",
"スペルを選択してください。"
);

return;

}

if(fromSpell){

player.spell.splice(selected.index,1);

}else{

player.hand.splice(selected.index,1);

}

player.grave.push(card);

phasePopup("スペル発動");

openModal(
"スペル発動",
card.name+"を発動。"
);

if(card.spell==="atkUp"){

if(player.battle.length>0){

player.battle[0].tempAtk+=500;

openModal(
"効果",
player.battle[0].name+"のATK+500。"
);

}

}

if(card.spell==="atkDown"){

if(enemy.battle.length>0){

enemy.battle[0].tempAtk-=500;

openModal(
"効果",
enemy.battle[0].name+"のATK-500。"
);

}

}

if(card.spell==="destroy"){

if(enemy.battle.length>0){

const dead=enemy.battle.shift();

enemy.grave.push(dead);

openModal(
"破壊",
dead.name+"を破壊して墓地へ。"
);

}

}

selected=null;

render();

}

function endTurn(){

if(turnPlayer!=="player") return;

turnPlayer="enemy";

normalUsed=false;
tributeUsed=false;
tributeTargets=[];
tributeModeActive=false;

phasePopup("ターン終了");

openModal(
"ターン終了",
"CPUターン開始"
);

render();

setTimeout(cpuTurn,1000);

}

function cpuTurn(){

phasePopup("CPUターン");

draw(enemy);

openModal(
"ドローフェイズ",
"CPUが1枚ドロー。"
);

const monster=enemy.hand.find(c=>c.type==="monster"&&c.core<5);

if(monster){

enemy.hand.splice(enemy.hand.indexOf(monster),1);

enemy.battle.push(monster);

openModal(
"CPU召喚",
monster.name+"を召喚。"
);

}

if(!firstTurn){

if(enemy.battle.length>0){

const attacker=enemy.battle[0];

openModal(
"CPU攻撃",
attacker.name+"が攻撃。"
);

if(player.battle.length>0){

const blocker=player.battle[0];

openModal(
"ブロック",
blocker.name+"がブロック。"
);

if(getAtk(attacker)>blocker.def){

player.grave.push(player.battle.shift());

openModal(
"戦闘結果",
blocker.name+"が破壊された。"
);

}else if(getAtk(attacker)<blocker.def){

enemy.grave.push(enemy.battle.shift());

openModal(
"戦闘結果",
attacker.name+"が破壊された。"
);

}else{

player.grave.push(player.battle.shift());
enemy.grave.push(enemy.battle.shift());

openModal(
"戦闘結果",
"相打ち。"
);

}

}else{

player.lp-=attacker.dmg;

openModal(
"直接攻撃",
"プレイヤーに"+attacker.dmg+"ダメージ。"
);

}

}

}else{

openModal(
"攻撃不可",
"先攻1ターン目なのでCPUは攻撃できない。"
);

firstTurn=false;

}

checkWin();

turnPlayer="player";

draw(player);

phasePopup("プレイヤーターン");

openModal(
"ドローフェイズ",
"1枚ドロー。"
);

render();

}

function checkWin(){

if(player.lp<=0){

openModal(
"敗北",
"あなたの敗北。"
);

}

if(enemy.lp<=0){

openModal(
"勝利",
"あなたの勝利！"
);

}

}

function addLog(text){

const log=document.getElementById("log");

log.innerHTML="• "+text+"<br>"+log.innerHTML;

}

function openModal(title,text){

document.getElementById("modal").classList.remove("hidden");

document.getElementById("modalTitle").innerHTML=title;
