<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TCG Prototype</title>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#070b18;
color:white;
font-family:sans-serif;
padding-bottom:90px;
}

.topbar{
position:sticky;
top:0;
z-index:50;
background:#10183a;
padding:12px;
border-bottom:2px solid #1d2a68;
}

button{
border:none;
border-radius:12px;
padding:12px;
font-weight:bold;
background:#536dff;
color:white;
}

.home-screen{
padding:14px;
}

.menu-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:16px;
}

.menu-btn{
height:100px;
font-size:20px;
border-radius:18px;
background:#17214b;
border:2px solid #394a96;
display:flex;
justify-content:center;
align-items:center;
}

.cpu-select{
margin-top:18px;
background:#111936;
padding:12px;
border-radius:14px;
border:2px solid #28366d;
}

.cpu-list{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

.cpu-btn{
background:#1c2858;
}

.game{
padding:10px;
}

.player-area{
background:#0d1431;
border:2px solid #2d3f89;
border-radius:18px;
padding:10px;
margin-bottom:14px;
}

.active-turn{
border:2px solid gold;
box-shadow:0 0 15px rgba(255,215,0,0.4);
}

.zone-title{
font-weight:bold;
margin:8px 0 4px;
}

.zone{
display:grid;
grid-template-columns:repeat(5,minmax(0,1fr));
gap:4px;
width:100%;
overflow:hidden;
}

.slot{
height:72px;
min-width:0;
border:1px dashed #4f587e;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
color:#6f789e;
font-size:11px;
background:#101427;
overflow:hidden;
}

.card{
width:100%;
min-width:0;
height:110px;
overflow:hidden;
background:#1f2854;
border:1px solid #4d5ba5;
border-radius:12px;
padding:4px;
font-size:10px;
}

.monster{
background:#2a315f;
}

.spell{
background:#16535c;
}

.card-name{
font-size:11px;
font-weight:bold;
line-height:1.1;
margin-bottom:2px;
}

.hand{
display:grid;
grid-template-columns:repeat(5,minmax(0,1fr));
gap:4px;
width:100%;
}

.bottom-actions{
position:fixed;
bottom:0;
left:0;
right:0;
background:#10183a;
padding:8px;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
z-index:100;
}

.bottom-actions button{
padding:10px 4px;
font-size:12px;
}

.log{
background:black;
padding:10px;
border-radius:12px;
margin:10px 0;
font-size:13px;
max-height:180px;
overflow:auto;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
background:#1b2147;
padding:20px;
border-radius:20px;
width:85%;
max-width:360px;
border:3px solid #e2b84e;
text-align:center;
}

.hidden{
display:none;
}

h1,h2,h3{
margin-top:0;
}

.small{
font-size:12px;
opacity:0.8;
}

</style>
</head>

<body>

<div id="homeScreen" class="home-screen">

<h1>TCG Prototype</h1>

<div class="menu-grid">

<div class="menu-btn">対戦</div>
<div class="menu-btn">カード</div>
<div class="menu-btn">デッキ</div>
<div class="menu-btn">パック</div>

</div>

<div class="cpu-select">

<h3>CPUレベル選択</h3>

<div class="cpu-list">

<button class="cpu-btn" onclick="startGame(1)">CPU Lv.1</button>
<button class="cpu-btn" onclick="startGame(2)">CPU Lv.2</button>
<button class="cpu-btn" onclick="startGame(3)">CPU Lv.3</button>
<button class="cpu-btn" onclick="startGame(4)">CPU Lv.4</button>
<button class="cpu-btn" onclick="startGame(5)">CPU Lv.5</button>
<button class="cpu-btn" onclick="startGame(6)">CPU Lv.6</button>
<button class="cpu-btn" onclick="startGame(7)">CPU Lv.7</button>
<button class="cpu-btn" onclick="startGame(8)">CPU Lv.8</button>
<button class="cpu-btn" onclick="startGame(9)">CPU Lv.9</button>
<button class="cpu-btn" onclick="startGame(10)">CPU Lv.10</button>

</div>

</div>

</div>

<div id="gameScreen" class="hidden">

<div class="topbar">

<div id="turnText"></div>
<div class="small" id="summonText"></div>

</div>

<div class="game">

<div id="enemyArea" class="player-area">

<h2 id="enemyName"></h2>

<div class="small" id="enemyInfo"></div>

<div class="zone-title">スペルゾーン</div>
<div class="zone" id="enemySpell"></div>

<div class="zone-title">バトルゾーン</div>
<div class="zone" id="enemyBattle"></div>

</div>

<div class="log" id="log"></div>

<div id="playerArea" class="player-area">

<h2>プレイヤー LP:<span id="playerLP"></span></h2>

<div class="small" id="playerInfo"></div>

<div class="zone-title">バトルゾーン</div>
<div class="zone" id="playerBattle"></div>

<div class="zone-title">スペルゾーン</div>
<div class="zone" id="playerSpell"></div>

<div class="zone-title">手札</div>
<div class="hand" id="playerHand"></div>

</div>

</div>

<div class="bottom-actions">

<button onclick="normalSummon()">通常召喚</button>
<button onclick="tributeSummon()">生贄召喚</button>
<button onclick="attack()">攻撃</button>
<button onclick="spell()">スペル</button>
<button onclick="endTurn()">終了</button>

</div>

</div>

<div id="modal" class="modal hidden">

<div class="modal-box">

<h2>先攻後攻決定</h2>

<p id="modalText"></p>

<button onclick="closeModal()">OK</button>

</div>

</div>

<script>

const baseDeck = [

{name:"火の小兵",type:"monster",core:1,atk:500,def:500,dmg:1},
{name:"火炎兵",type:"monster",core:2,atk:1000,def:500,dmg:1},
{name:"紅蓮守士",type:"monster",core:2,atk:500,def:1000,dmg:1},
{name:"紅蓮騎士",type:"monster",core:3,atk:1000,def:1000,dmg:2},
{name:"炎刃将",type:"monster",core:4,atk:1500,def:1000,dmg:3},
{name:"炎帝竜",type:"monster",core:5,atk:2000,def:1500,dmg:4},

{name:"炎刃強化",type:"spell"},
{name:"弱体呪",type:"spell"},
{name:"爆砕魔法",type:"spell"}

];

let player;
let enemy;
let turnPlayer="player";
let normalUsed=false;
let tributeUsed=false;
let cpuLevel=1;

function buildDeck(){

let deck=[];

for(let i=0;i<3;i++) deck.push({...baseDeck[0]});
for(let i=0;i<3;i++) deck.push({...baseDeck[1]});
for(let i=0;i<2;i++) deck.push({...baseDeck[2]});
for(let i=0;i<2;i++) deck.push({...baseDeck[3]});
for(let i=0;i<2;i++) deck.push({...baseDeck[4]});
for(let i=0;i<2;i++) deck.push({...baseDeck[5]});
for(let i=0;i<2;i++) deck.push({...baseDeck[6]});
for(let i=0;i<2;i++) deck.push({...baseDeck[7]});
for(let i=0;i<2;i++) deck.push({...baseDeck[8]});

return shuffle(deck);

}

function shuffle(arr){

return arr.sort(()=>Math.random()-0.5);

}

function startGame(level){

cpuLevel=level;

document.getElementById("homeScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

player={
lp:20,
deck:buildDeck(),
hand:[],
battle:[],
spell:[]
};

enemy={
lp:20,
deck:buildDeck(),
hand:[],
battle:[],
spell:[]
};

for(let i=0;i<5;i++){

draw(player);
draw(enemy);

}

turnPlayer=Math.random()<0.5?"player":"enemy";

document.getElementById("modal").classList.remove("hidden");

document.getElementById("modalText").innerHTML=
(turnPlayer==="player"?"プレイヤー":"CPU Lv."+cpuLevel)
+" が先攻です。<br>先攻1ターン目はドローなし。";

addLog((turnPlayer==="player"?"プレイヤー":"CPU Lv."+cpuLevel)+"が先攻。");

render();

if(turnPlayer==="enemy"){

setTimeout(cpuTurn,1000);

}

}

function closeModal(){

document.getElementById("modal").classList.add("hidden");

}

function draw(target){

if(target.deck.length>0){

target.hand.push(target.deck.shift());

}

}

function render(){

document.getElementById("turnText").innerHTML=
(turnPlayer==="player"?"プレイヤー":"CPU Lv."+cpuLevel)+"のターン";

document.getElementById("summonText").innerHTML=
"通常召喚："+(normalUsed?"済":"未")
+" / 生贄召喚："+(tributeUsed?"済":"未")
+" / CPU Lv."+cpuLevel;

document.getElementById("playerLP").innerText=player.lp;

document.getElementById("enemyName").innerHTML=
"CPU Lv."+cpuLevel+" LP:"+enemy.lp;

document.getElementById("playerInfo").innerHTML=
"山札:"+player.deck.length+" 手札:"+player.hand.length;

document.getElementById("enemyInfo").innerHTML=
"山札:"+enemy.deck.length+" 手札:"+enemy.hand.length;

renderZone("playerBattle",player.battle);
renderZone("playerSpell",player.spell);
renderZone("enemyBattle",enemy.battle);
renderZone("enemySpell",enemy.spell);

renderHand();

document.getElementById("playerArea").className=
"player-area"+(turnPlayer==="player"?" active-turn":"");

document.getElementById("enemyArea").className=
"player-area"+(turnPlayer==="enemy"?" active-turn":"");

}

function renderZone(id,data){

const zone=document.getElementById(id);

zone.innerHTML="";

for(let i=0;i<5;i++){

const slot=document.createElement("div");

if(data[i]){

slot.className="card "+data[i].type;

slot.innerHTML=cardHTML(data[i]);

}else{

slot.className="slot";
slot.innerHTML="空";

}

zone.appendChild(slot);

}

}

function renderHand(){

const hand=document.getElementById("playerHand");

hand.innerHTML="";

player.hand.forEach(card=>{

const div=document.createElement("div");

div.className="card "+card.type;

div.innerHTML=cardHTML(card);

hand.appendChild(div);

});

}

function cardHTML(card){

if(card.type==="monster"){

return `
<div class="card-name">${card.name}</div>
<div>コア${card.core}</div>
<div>ATK:${card.atk}</div>
<div>DEF:${card.def}</div>
<div>DMG:${card.dmg}</div>
`;

}

return `
<div class="card-name">${card.name}</div>
<div>スペル</div>
`;

}

function normalSummon(){

if(turnPlayer!=="player") return;

if(normalUsed){

alert("通常召喚済み");
return;

}

const card=player.hand.find(c=>c.type==="monster"&&c.core<=player.battle.length+1);

if(!card){

alert("召喚可能モンスターなし");
return;

}

player.hand.splice(player.hand.indexOf(card),1);

player.battle.push(card);

normalUsed=true;

addLog(card.name+"を通常召喚");

render();

}

function tributeSummon(){

if(turnPlayer!=="player") return;

if(tributeUsed){

alert("生贄召喚済み");
return;

}

const high=player.hand.find(c=>c.type==="monster"&&c.core>=5);

if(!high){

alert("生贄召喚可能カードなし");
return;

}

let total=0;

player.battle.forEach(m=>total+=m.core);

if(total<high.core){

alert("コア不足");
return;

}

player.battle=[];

player.hand.splice(player.hand.indexOf(high),1);

player.battle.push(high);

tributeUsed=true;

addLog(high.name+"を生贄召喚");

render();

}

function attack(){

if(turnPlayer!=="player") return;

if(player.battle.length===0) return;

if(enemy.battle.length===0){

enemy.lp-=player.battle[0].dmg;

addLog(player.battle[0].name+"が直接攻撃");

}else{

enemy.battle.shift();

addLog("相手モンスターを破壊");

}

render();

checkWin();

}

function spell(){

if(turnPlayer!=="player") return;

const card=player.hand.find(c=>c.type==="spell");

if(!card){

alert("スペルなし");
return;

}

player.hand.splice(player.hand.indexOf(card),1);

player.spell.push(card);

addLog(card.name+"発動");

render();

}

function endTurn(){

turnPlayer=turnPlayer==="player"?"enemy":"player";

normalUsed=false;
tributeUsed=false;

if(!(turnPlayer==="player"&&player.firstTurn)){

draw(turnPlayer==="player"?player:enemy);

}

render();

if(turnPlayer==="enemy"){

setTimeout(cpuTurn,1000);

}

}

function cpuTurn(){

const card=enemy.hand.find(c=>c.type==="monster");

if(card){

enemy.hand.splice(enemy.hand.indexOf(card),1);

enemy.battle.push(card);

addLog("CPU Lv."+cpuLevel+"が"+card.name+"を召喚");

}

if(enemy.battle.length){

if(player.battle.length===0){

player.lp-=enemy.battle[0].dmg;

addLog(enemy.battle[0].name+"が直接攻撃");

}else{

player.battle.shift();

addLog("CPUがモンスター破壊");

}

}

render();

checkWin();

setTimeout(endTurn,1200);

}

function addLog(text){

const log=document.getElementById("log");

log.innerHTML="• "+text+"<br>"+log.innerHTML;

}

function checkWin(){

if(player.lp<=0){

alert("敗北");
location.reload();
}

if(enemy.lp<=0){

alert("勝利");
location.reload();
}

}

</script>

</body>
</html>
